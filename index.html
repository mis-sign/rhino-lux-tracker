<style>
  :root{
    --ink:#1B1D19;
    --paper:#F6F4EE;
    --panel:#FFFFFF;
    --hide:#5B6154;
    --hide-light:#DEDBCB;
    --hide-faint:#EFEDE2;
    --brass:#B8863E;
    --brass-deep:#8F6629;
    --brass-tint:#F1E4CC;
    --alert:#A8432E;
    --alert-bg:#F4E1DA;
    --good:#4F7355;
    --good-bg:#E3ECE1;
    --radius:6px;
    --shadow:0 1px 2px rgba(27,29,25,0.06), 0 6px 18px rgba(27,29,25,0.06);
    --font-display:'Space Grotesk', 'Arial Narrow', sans-serif;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    font-size:15px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{ font-family:var(--font-display); margin:0; color:var(--ink); }
  button, input, select, textarea{ font-family:inherit; font-size:inherit; color:inherit; }
  :focus-visible{ outline:2px solid var(--brass); outline-offset:2px; }
  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; }
  }

  .shell{ max-width:1180px; margin:0 auto; padding:0 24px 64px; }

  /* ---------- Header ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:28px 24px 20px; max-width:1180px; margin:0 auto;
    border-bottom:1px solid var(--hide-light);
  }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand__mark{
    width:44px; height:44px; border-radius:var(--radius);
    background:var(--ink); color:var(--brass);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:16px;
    letter-spacing:0.5px;
  }
  .brand__name{ font-family:var(--font-display); font-weight:700; font-size:20px; letter-spacing:1px; }
  .brand__sub{ font-size:12.5px; color:var(--hide); letter-spacing:0.3px; margin-top:1px; }

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex; gap:4px; max-width:1180px; margin:0 auto;
    padding:0 24px; border-bottom:1px solid var(--hide-light);
    overflow-x:auto;
  }
  .tab{
    background:none; border:none; cursor:pointer;
    padding:14px 16px 12px; font-size:14px; font-weight:600;
    color:var(--hide); border-bottom:2px solid transparent;
    white-space:nowrap;
  }
  .tab:hover{ color:var(--ink); }
  .tab.active{ color:var(--ink); border-bottom-color:var(--brass); }

  /* ---------- View head ---------- */
  .view-head{
    display:flex; align-items:flex-end; justify-content:space-between;
    flex-wrap:wrap; gap:12px;
    margin:32px 0 20px;
  }
  .eyebrow{
    font-family:var(--font-display); font-size:11.5px; font-weight:600;
    letter-spacing:1.6px; text-transform:uppercase; color:var(--brass-deep);
    margin-bottom:4px;
  }
  .view-head h2{ font-size:24px; }
  .field-inline{ display:flex; align-items:center; gap:8px; }
  .field-inline label{ font-size:13px; color:var(--hide); }
  .dash-controls{ display:flex; gap:18px; flex-wrap:wrap; align-items:center; }
  .badge{ display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600; white-space:nowrap; }
  .badge--alert{ background:var(--alert-bg); color:var(--alert); }
  .badge--good{ background:var(--good-bg); color:var(--good); }
  .text-muted{ color:var(--hide); font-style:italic; }

  /* ---------- Stat cards ---------- */
  .stat-grid{
    display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:24px;
  }
  .stat-card{
    background:var(--panel); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:18px 18px 16px; border:1px solid var(--hide-light);
  }
  .stat-card--alert{ border-color:var(--alert); background:var(--alert-bg); }
  .stat-card__label{ font-size:12.5px; color:var(--hide); margin-bottom:8px; }
  .stat-card--alert .stat-card__label{ color:var(--alert); }
  .stat-card__value{ font-family:var(--font-display); font-size:30px; font-weight:700; }
  .stat-card--alert .stat-card__value{ color:var(--alert); }

  /* ---------- Panels ---------- */
  .panel{
    background:var(--panel); border:1px solid var(--hide-light); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:20px 22px 22px; margin-bottom:20px;
  }
  .panel__head{ margin-bottom:14px; }
  .panel__head h3{ font-size:17px; }
  .panel__subhead{ font-size:15px; font-weight:600; margin:0 0 14px; font-family:var(--font-body); }
  .panel--form{ background:var(--hide-faint); }

  .notice{
    background:var(--brass-tint); border:1px solid var(--brass); border-radius:var(--radius);
    padding:14px 16px; font-size:14px; color:var(--ink);
  }

  /* ---------- Forms ---------- */
  .form-row{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:14px; }
  .form-row:has(.form-field:nth-child(2):last-child){ grid-template-columns:1fr 1fr; }
  .form-field{ display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
  .form-row .form-field{ margin-bottom:0; }
  .form-field label{ font-size:13px; font-weight:600; color:var(--ink); }
  .form-field .optional{ font-weight:400; color:var(--hide); }
  .form-field input, .form-field select, .form-field textarea{
    border:1px solid var(--hide-light); border-radius:var(--radius);
    padding:9px 11px; background:var(--panel); width:100%; resize:vertical;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus{
    border-color:var(--brass);
  }
  .form-actions{ display:flex; gap:10px; margin-top:6px; }

  .btn{
    border:1px solid var(--ink); background:var(--ink); color:var(--paper);
    border-radius:var(--radius); padding:10px 18px; font-weight:600; font-size:14px;
    cursor:pointer;
  }
  .btn:hover{ background:#000; }
  .btn--primary{ background:var(--brass); border-color:var(--brass-deep); color:var(--ink); }
  .btn--primary:hover{ background:var(--brass-deep); color:var(--paper); }
  .btn--ghost{ background:transparent; color:var(--ink); border-color:var(--hide-light); }
  .btn--ghost:hover{ border-color:var(--ink); }

  /* ---------- Tables ---------- */
  .table-wrap{ overflow-x:auto; }
  .table{ width:100%; border-collapse:collapse; font-size:14px; }
  .table th{
    text-align:left; font-family:var(--font-display); font-size:11.5px;
    letter-spacing:0.8px; text-transform:uppercase; color:var(--hide);
    border-bottom:1px solid var(--hide-light); padding:8px 10px;
  }
  .table td{ padding:11px 10px; border-bottom:1px solid var(--hide-faint); vertical-align:top; }
  .table tr:last-child td{ border-bottom:none; }
  .table tr.row--alert td{ background:var(--alert-bg); }
  .table tr.row--alert td:first-child{ font-weight:600; color:var(--alert); }
  .nowrap{ white-space:nowrap; }
  .actions-cell{ text-align:right; }
  .link-btn{
    background:none; border:none; cursor:pointer; color:var(--brass-deep);
    font-weight:600; font-size:13px; padding:2px 4px;
  }
  .link-btn:hover{ text-decoration:underline; }
  .link-btn--danger{ color:var(--alert); }

  /* ---------- Filter bar ---------- */
  .filter-bar{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .filter-bar input, .filter-bar select{
    border:1px solid var(--hide-light); border-radius:var(--radius);
    padding:9px 11px; background:var(--panel);
  }
  .filter-bar input{ flex:1; min-width:200px; }

  /* ---------- Activity list ---------- */
  .activity-list{ display:flex; flex-direction:column; gap:14px; }
  .activity-item{ display:flex; gap:16px; padding-bottom:14px; border-bottom:1px solid var(--hide-faint); }
  .activity-item:last-child{ border-bottom:none; padding-bottom:0; }
  .activity-item__date{ width:90px; flex-shrink:0; font-size:13px; color:var(--hide); font-weight:600; }
  .activity-item__title{ font-size:14.5px; margin-bottom:3px; }
  .activity-item__note{ font-size:14px; color:var(--ink); }
  .activity-item__outcome{ font-size:13px; color:var(--brass-deep); margin-top:4px; font-weight:600; }

  .empty-state{ color:var(--hide); font-size:14px; padding:18px 4px; }
  .loading-state{ color:var(--hide); font-size:14px; padding:60px 4px; text-align:center; }

  /* ---------- Pulse heatmap ---------- */
  .pulse{ display:flex; gap:3px; }
  .pulse__cell{
    width:13px; height:13px; border-radius:3px; background:var(--hide-light);
    display:inline-block;
  }
  .pulse__cell--filled{ background:var(--brass); }

  /* ---------- Modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(27,29,25,0.45);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal{
    background:var(--panel); border-radius:var(--radius); max-width:560px; width:100%;
    max-height:80vh; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,0.3);
  }
  .modal__head{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px; border-bottom:1px solid var(--hide-light);
  }
  .modal__head h3{ font-size:16px; font-family:var(--font-body); font-weight:700; }
  .modal__close{ background:none; border:none; font-size:22px; cursor:pointer; color:var(--hide); line-height:1; }
  .modal__close:hover{ color:var(--ink); }
  .modal__body{ padding:18px 20px; overflow-y:auto; }

  /* ---------- Footer ---------- */
  .footer{
    max-width:1180px; margin:0 auto; padding:30px 24px 0; display:flex;
    justify-content:space-between; align-items:center; font-size:12.5px; color:var(--hide);
    border-top:1px solid var(--hide-light); margin-top:30px;
  }
  .footer button{ background:none; border:none; color:var(--hide); text-decoration:underline; cursor:pointer; font-size:12.5px; }
  .footer button:hover{ color:var(--alert); }

  @media (max-width: 760px){
    .stat-grid{ grid-template-columns:1fr 1fr; }
    .form-row{ grid-template-columns:1fr !important; }
    .topbar{ padding:20px 16px 16px; }
    .tabs{ padding:0 16px; }
    .shell, .footer{ padding-left:16px; padding-right:16px; }
    .activity-item{ flex-direction:column; gap:4px; }
    .activity-item__date{ width:auto; }
  }
</style>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand__mark">RL</div>
      <div>
        <div class="brand__name">RHINO LUX</div>
        <div class="brand__sub">Sales Field Intelligence (Cloud Synced)</div>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="addvisit">Log a Visit</button>
    <button class="tab" data-tab="visitlog">Visit Log</button>
    <button class="tab" data-tab="parties">Parties</button>
    <button class="tab" data-tab="team">Sales Team</button>
  </nav>

  <div class="shell">
    <div id="app"><div class="loading-state">Connecting to live cloud network...</div></div>
  </div>

  <div class="footer">
    <span>Shared workspace — Cloud synced across all laptops/desktops.</span>
    <button id="resetDataBtn">Reset all data</button>
  </div>

<script>
(function(){

  // ---------------- State ----------------
  let state = {
    tab: 'dashboard',
    salespeople: [],
    parties: [],
    visits: [],
    dashMonth: null,
    dashSp: 'all',
    editingVisitId: null,
    editingPartyId: null,
    editingSpId: null,
    modal: null,
    logFilters: { sp:'all', party:'all', month:'all', search:'' }
  };

  // ---------------- Utilities ----------------
  function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function esc(str){
    if(str === undefined || str === null) return '';
    return String(str).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function currentMonthKey(){ return new Date().toISOString().slice(0,7); }

  function monthLabel(mk){
    if(!mk) return '';
    const parts = mk.split('-');
    const y = Number(parts[0]), m = Number(parts[1]);
    const names=['January','February','March','April','May','June','July','August','September','October','November','December'];
    return names[m-1] + ' ' + y;
  }

  function shiftMonth(mk, delta){
    const parts = mk.split('-');
    let y = Number(parts[0]), m = Number(parts[1]);
    m += delta;
    while(m<1){ m+=12; y-=1; }
    while(m>12){ m-=12; y+=1; }
    return y + '-' + String(m).padStart(2,'0');
  }

  function dateLabel(dateStr){
    if(!dateStr) return '—';
    const d = new Date(dateStr + 'T00:00:00');
    if(isNaN(d.getTime())) return dateStr;
    const names=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return names[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function daysSince(dateStr){
    if(!dateStr) return null;
    const d = new Date(dateStr + 'T00:00:00');
    const now = new Date(); now.setHours(0,0,0,0);
    return Math.round((now - d) / 86400000);
  }

  // ---------------- Lookups ----------------
  function spName(id){ const s = state.salespeople.find(function(x){ return x.id===id; }); return s ? s.name : '— removed —'; }
  function partyName(id){ const p = state.parties.find(function(x){ return x.id===id; }); return p ? p.name : '— removed —'; }

  function visitsForParty(id){
    return state.visits.filter(function(v){ return v.partyId===id; })
      .sort(function(a,b){ return b.date.localeCompare(a.date); });
  }
  function visitsForSp(id){
    return state.visits.filter(function(v){ return v.spId===id; })
      .sort(function(a,b){ return b.date.localeCompare(a.date); });
  }
  function visitsInMonthForParty(id, mk){
    return state.visits.filter(function(v){ return v.partyId===id && v.date.slice(0,7)===mk; });
  }
  function totalVisitsInMonth(mk){
    return state.visits.filter(function(v){ return v.date.slice(0,7)===mk; }).length;
  }
  function partiesAssignedTo(spId){
    return state.parties.filter(function(p){ return p.assignedSpId === spId; });
  }
  function unassignedParties(){
    return state.parties.filter(function(p){
      return !p.assignedSpId || !state.salespeople.some(function(s){ return s.id === p.assignedSpId; });
    });
  }
  function visitedInMonthBySp(spId, partyId, mk){
    return state.visits.some(function(v){ return v.spId===spId && v.partyId===partyId && v.date.slice(0,7)===mk; });
  }
  function lastVisitByForParty(spId, partyId){
    const vs = state.visits.filter(function(v){ return v.spId===spId && v.partyId===partyId; })
      .sort(function(a,b){ return b.date.localeCompare(a.date); });
    return vs.length ? vs[0].date : null;
  }

  function pulseMonths(refMk, count){
    const arr = []; let mk = refMk;
    for(let i=0;i<count;i++){ arr.unshift(mk); mk = shiftMonth(mk,-1); }
    return arr;
  }
  function renderPulse(partyId, refMk){
    const months = pulseMonths(refMk, 6);
    return '<div class="pulse">' + months.map(function(mk){
      const visited = visitsInMonthForParty(partyId, mk).length > 0;
      return '<span class="pulse__cell' + (visited?' pulse__cell--filled':'') + '" title="' + esc(monthLabel(mk)) + ': ' + (visited?'visited':'no visit') + '"></span>';
    }).join('') + '</div>';
  }
  function renderPulseForSp(partyId, spId, refMk){
    const months = pulseMonths(refMk, 6);
    return '<div class="pulse">' + months.map(function(mk){
      const visited = visitedInMonthBySp(spId, partyId, mk);
      return '<span class="pulse__cell' + (visited?' pulse__cell--filled':'') + '" title="' + esc(monthLabel(mk)) + ': ' + (visited?'visited':'no visit') + '"></span>';
    }).join('') + '</div>';
  }

  function buildMonthOptionsForDashboard(selectedMk){
    const set = new Set(state.visits.map(function(v){ return v.date.slice(0,7); }));
    set.add(currentMonthKey());
    set.add(selectedMk);
    const arr = Array.from(set).sort().reverse();
    return arr.map(function(mk){
      return '<option value="' + mk + '"' + (mk===selectedMk?' selected':'') + '>' + esc(monthLabel(mk)) + '</option>';
    }).join('');
  }

  // ---------------- Live Cloud Sync Hooks ----------------
  function setupCloudSync(){
    db.collection("salespeople").onSnapshot(function(snapshot) {
      state.salespeople = [];
      snapshot.forEach(function(doc) { state.salespeople.push({id: doc.id, ...doc.data()}); });
      render();
    });

    db.collection("parties").onSnapshot(function(snapshot) {
      state.parties = [];
      snapshot.forEach(function(doc) { state.parties.push({id: doc.id, ...doc.data()}); });
      render();
    });

    db.collection("visits").onSnapshot(function(snapshot) {
      state.visits = [];
      snapshot.forEach(function(doc) { state.visits.push({id: doc.id, ...doc.data()}); });
      render();
    });
  }

  async function saveSalespersonCloud(id, data){
    await db.collection("salespeople").doc(id).set(data, {merge: true});
  }
  async function savePartyCloud(id, data){
    await db.collection("parties").doc(id).set(data, {merge: true});
  }
  async function saveVisitCloud(id, data){
    await db.collection("visits").doc(id).set(data, {merge: true});
  }

  // ---------------- Renderers ----------------
  function renderDashboard(){
    const mk = state.dashMonth || currentMonthKey();
    const spScope = state.dashSp || 'all';

    const spOptions = ['<option value="all"' + (spScope==='all'?' selected':'') + '>All salespeople</option>'].concat(
      state.salespeople.slice().sort(function(a,b){ return a.name.localeCompare(b.name); }).map(function(s){
        return '<option value="' + s.id + '"' + (spScope===s.id?' selected':'') + '>' + esc(s.name) + '</option>';
      })
    ).join('');

    const head = ''
    + '<div class="view-head">'
    +   '<div><div class="eyebrow">Overview</div><h2>Dashboard</h2></div>'
    +   '<div class="dash-controls">'
    +     '<div class="field-inline"><label for="dashSpSelect">Salesperson</label>'
    +       '<select id="dashSpSelect">' + spOptions + '</select></div>'
    +     '<div class="field-inline"><label for="dashMonthSelect">Reporting month</label>'
    +       '<select id="dashMonthSelect">' + buildMonthOptionsForDashboard(mk) + '</select></div>'
    +   '</div>'
    + '</div>';

    if(spScope === 'all'){
      return head + renderDashboardAll(mk);
    }
    const spExists = state.salespeople.some(function(s){ return s.id === spScope; });
    if(!spExists){
      return head + '<div class="panel"><div class="empty-state">This salesperson is no longer on file.</div></div>';
    }
    return head + renderDashboardForSalesperson(spScope, mk);
  }

  function renderDashboardAll(mk){
    const totalVisits = state.visits.length;
    const visitsThisMonth = totalVisitsInMonth(mk);
    const teamSize = state.salespeople.length;

    const sortedSp = state.salespeople.slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
    const coverageRows = sortedSp.map(function(s){
      const assigned = partiesAssignedTo(s.id);
      const visitedCount = assigned.filter(function(p){ return visitedInMonthBySp(s.id, p.id, mk); }).length;
      const notVisitedCount = assigned.length - visitedCount;
      const pct = assigned.length ? Math.round((visitedCount / assigned.length) * 100) : null;
      return { sp:s, assignedCount: assigned.length, visitedCount:visitedCount, notVisitedCount:notVisitedCount, pct:pct };
    });
    const totalNotVisitedAssigned = coverageRows.reduce(function(sum,r){ return sum + r.notVisitedCount; }, 0);
    const unassigned = unassignedParties();

    const notVisitedAll = state.parties
      .map(function(p){
        const vs = visitsForParty(p.id);
        const last = vs.length ? vs[0].date : null;
        const inMonth = visitsInMonthForParty(p.id, mk).length;
        const assignedSp = state.salespeople.find(function(s){ return s.id === p.assignedSpId; });
        return { id:p.id, name:p.name, location:p.location, last:last, inMonth:inMonth, assignedName: assignedSp ? assignedSp.name : null };
      })
      .filter(function(p){ return p.inMonth === 0; })
      .sort(function(a,b){
        if(!a.last && !b.last) return a.name.localeCompare(b.name);
        if(!a.last) return -1;
        if(!b.last) return 1;
        return a.last.localeCompare(b.last);
      });

    const recent = state.visits.slice().sort(function(a,b){
      return b.date.localeCompare(a.date) || String(b.id).localeCompare(String(a.id));
    }).slice(0,8);

    return ''
    + '<div class="stat-grid">'
    +   '<div class="stat-card"><div class="stat-card__label">Total visits logged</div><div class="stat-card__value">' + totalVisits + '</div></div>'

  function renderDashboardForSalesperson(spId, mk){
    const sp = state.salespeople.find(function(s){ return s.id === spId; });
    const spLabel = sp ? sp.name : '— removed —';

    const myVisits = visitsForSp(spId);
    const totalVisits = myVisits.length;

    const assigned = partiesAssignedTo(spId).slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
    const coverage = assigned.map(function(p){
      const visitedThisMonth = visitedInMonthBySp(spId, p.id, mk);
      const lastVisit = lastVisitByForParty(spId, p.id);
      return { id:p.id, name:p.name, location:p.location, lastVisit:lastVisit, visitedThisMonth:visitedThisMonth };
    });

    const notVisited = coverage.filter(function(c){ return !c.visitedThisMonth; })
      .sort(function(a,b){
        if(!a.lastVisit && !b.lastVisit) return a.name.localeCompare(b.name);
        if(!a.lastVisit) return -1;
        if(!b.lastVisit) return 1;
        return a.lastVisit.localeCompare(b.lastVisit);
      });
    const visited = coverage.filter(function(c){ return c.visitedThisMonth; })
      .sort(function(a,b){ return a.name.localeCompare(b.name); });

    const recent = myVisits.slice(0,8);

    return ''
    + '<div class="stat-grid">'
    +   '<div class="stat-card"><div class="stat-card__label">Assigned customers</div><div class="stat-card__value">' + assigned.length + '</div></div>'
    +   '<div class="stat-card"><div class="stat-card__label">Visited in ' + esc(monthLabel(mk)) + '</div><div class="stat-card__value">' + visited.length + '</div></div>'
    +   '<div class="stat-card stat-card--alert"><div class="stat-card__label">Not visited in ' + esc(monthLabel(mk)) + '</div><div class="stat-card__value">' + notVisited.length + '</div></div>'
    +   '<div class="stat-card"><div class="stat-card__label">Total visits logged (all time)</div><div class="stat-card__value">' + totalVisits + '</div></div>'
    + '</div>'

    + '<div class="panel">'
    +   '<div class="panel__head"><div class="eyebrow">Coverage</div><h3>' + esc(spLabel) + '’s customer list — ' + esc(monthLabel(mk)) + '</h3></div>'
    +   (assigned.length === 0
          ? '<div class="empty-state">No customers are assigned to ' + esc(spLabel) + ' yet. Assign customers to them in the <strong>Parties</strong> tab.</div>'
          : '<div class="table-wrap"><table class="table"><thead><tr><th>Customer</th><th>Location</th><th>Status</th><th>Last visit by ' + esc(spLabel) + '</th><th>Last 6 months</th></tr></thead><tbody>'
            + notVisited.map(function(c){
                return '<tr class="row--alert"><td>' + esc(c.name) + '</td><td>' + esc(c.location||'—') + '</td>'
                  + '<td><span class="badge badge--alert">Not visited</span></td>'
                  + '<td>' + (c.lastVisit ? esc(dateLabel(c.lastVisit)) : 'Never') + '</td>'
                  + '<td>' + renderPulseForSp(c.id, spId, mk) + '</td></tr>';
              }).join('')
            + visited.map(function(c){
                return '<tr><td>' + esc(c.name) + '</td><td>' + esc(c.location||'—') + '</td>'
                  + '<td><span class="badge badge--good">Visited</span></td>'
                  + '<td>' + esc(dateLabel(c.lastVisit)) + '</td>'
                  + '<td>' + renderPulseForSp(c.id, spId, mk) + '</td></tr>';
              }).join('')
            + '</tbody></table></div>')
    + '</div>'

    + '<div class="panel">'
    +   '<div class="panel__head"><div class="eyebrow">Latest field activity</div><h3>Recent visits by ' + esc(spLabel) + '</h3></div>'
    +   (recent.length === 0
          ? '<div class="empty-state">No visits logged yet for ' + esc(spLabel) + '.</div>'
          : '<div class="activity-list">' + recent.map(function(v){
              return '<div class="activity-item"><div class="activity-item__date">' + esc(dateLabel(v.date)) + '</div>'
                + '<div class="activity-item__body"><div class="activity-item__title">Visited <strong>' + esc(partyName(v.partyId)) + '</strong></div>'
                + '<div class="activity-item__note">' + esc(v.discussion) + '</div></div></div>';
            }).join('') + '</div>')
    + '</div>';
  }

  function renderVisitLog(){
    const f = state.logFilters;
    let rows = state.visits.slice();
    if(f.sp !== 'all') rows = rows.filter(function(v){ return v.spId===f.sp; });
    if(f.party !== 'all') rows = rows.filter(function(v){ return v.partyId===f.party; });
    if(f.month !== 'all') rows = rows.filter(function(v){ return v.date.slice(0,7)===f.month; });
    if(f.search){
      const q = f.search.toLowerCase();
      rows = rows.filter(function(v){
        return (v.discussion||'').toLowerCase().indexOf(q)>-1
          || (v.outcome||'').toLowerCase().indexOf(q)>-1
          || spName(v.spId).toLowerCase().indexOf(q)>-1
          || partyName(v.partyId).toLowerCase().indexOf(q)>-1;
      });
    }
    rows.sort(function(a,b){ return b.date.localeCompare(a.date); });

    const spFilterOptions = ['<option value="all">All salespeople</option>'].concat(
      state.salespeople.map(function(s){ return '<option value="' + s.id + '"' + (f.sp===s.id?' selected':'') + '>' + esc(s.name) + '</option>'; })
    ).join('');
    const partyFilterOptions = ['<option value="all">All parties</option>'].concat(
      state.parties.map(function(p){ return '<option value="' + p.id + '"' + (f.party===p.id?' selected':'') + '>' + esc(p.name) + '</option>'; })
    ).join('');
    const monthSet = new Set(state.visits.map(function(v){ return v.date.slice(0,7); }));
    const monthFilterOptions = ['<option value="all">All time</option>'].concat(
      Array.from(monthSet).sort().reverse().map(function(mk){ return '<option value="' + mk + '"' + (f.month===mk?' selected':'') + '>' + esc(monthLabel(mk)) + '</option>'; })
    ).join('');

    return ''
    + '<div class="view-head"><div><div class="eyebrow">Records</div><h2>Visit Log</h2></div>'
    +   '<button class="btn btn--ghost" id="exportCsvBtn" type="button">Export CSV</button></div>'
    + '<div class="filter-bar">'
    +   '<input type="text" id="logSearch" placeholder="Search discussion notes…" value="' + esc(f.search) + '">'
    +   '<select id="logSpFilter">' + spFilterOptions + '</select>'
    +   '<select id="logPartyFilter">' + partyFilterOptions + '</select>'
    +   '<select id="logMonthFilter">' + monthFilterOptions + '</select>'
    + '</div>'
    + '<div class="panel">'
    +   (rows.length===0
          ? '<div class="empty-state">No visits match these filters.</div>'
          : '<div class="table-wrap"><table class="table"><thead><tr><th>Date</th><th>Salesperson</th><th>Party</th><th>Discussion</th><th>Outcome / next steps</th><th></th></tr></thead><tbody>'
            + rows.map(function(v){
                return '<tr><td class="nowrap">' + esc(dateLabel(v.date)) + '</td><td class="nowrap">' + esc(spName(v.spId)) + '</td>'
                  + '<td class="nowrap">' + esc(partyName(v.partyId)) + '</td><td>' + esc(v.discussion) + '</td><td>' + esc(v.outcome||'—') + '</td>'
                  + '<td class="nowrap actions-cell"><button class="link-btn" data-action="edit-visit" data-id="' + v.id + '">Edit</button>'
                  + '<button class="link-btn link-btn--danger" data-action="delete-visit" data-id="' + v.id + '">Delete</button></td></tr>';
              }).join('')
            + '</tbody></table></div>')
    + '</div>';

  function render(){
    const active = document.activeElement;
    const activeId = active && active.id;
    const selStart = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;
    const selEnd = active && typeof active.selectionEnd === 'number' ? active.selectionEnd : null;

    const app = document.getElementById('app');
    let html = '';
    if(state.tab === 'dashboard') html = renderDashboard();
    else if(state.tab === 'addvisit') html = renderAddVisit();
    else if(state.tab === 'visitlog') html = renderVisitLog();
    else if(state.tab === 'parties') html = renderParties();
    else if(state.tab === 'team') html = renderTeam();

    if(app) {
      app.innerHTML = html + renderModal();
    }

    document.querySelectorAll('.tab').forEach(function(btn){
      btn.classList.toggle('active', btn.dataset.tab === state.tab);
    });

    if(activeId){
      const el = document.getElementById(activeId);
      if(el){
        el.focus();
        if(selStart !== null && el.setSelectionRange){
          try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
        }
      }
    }
  }

    const f = state.logFilters;
    let rows = state.visits.slice();
    if(f.sp !== 'all') rows = rows.filter(function(v){ return v.spId===f.sp; });
    if(f.party !== 'all') rows = rows.filter(function(v){ return v.partyId===f.party; });
    if(f.month !== 'all') rows = rows.filter(function(v){ return v.date.slice(0,7)===f.month; });
    if(f.search){
      const q = f.search.toLowerCase();
      rows = rows.filter(function(v){
        return (v.discussion||'').toLowerCase().indexOf(q)>-1 || (v.outcome||'').toLowerCase().indexOf(q)>-1
          || spName(v.spId).toLowerCase().indexOf(q)>-1 || partyName(v.partyId).toLowerCase().indexOf(q)>-1;
      });
    }
    rows.sort(function(a,b){ return b.date.localeCompare(a.date); });

    const header = ['Date','Salesperson','Party','Discussion','Outcome / Next Steps'];
    const csvRows = [header.join(',')];
    rows.forEach(function(v){
      const cells = [v.date, spName(v.spId), partyName(v.partyId), v.discussion||'', v.outcome||''];
      csvRows.push(cells.map(function(c){ return '"' + String(c).replace(/"/g,'""') + '"'; }).join(','));
    });
    const csv = csvRows.join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'rhino-lux-visit-log.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  async function resetAllData(){
    if(!confirm('This will permanently delete all salespeople, parties, and visit records for everyone across all devices. Continue?')) return;
    if(!confirm('Are you absolutely sure? This cannot be undone.')) return;
    
    const tables = ['salespeople', 'parties', 'visits'];
    for(let table of tables){
      const snap = await db.collection(table).get();
      snap.forEach(function(doc) { doc.ref.delete(); });
    }
    
    state.salespeople = []; state.parties = []; state.visits = [];
    state.editingVisitId = null; state.editingPartyId = null; state.editingSpId = null; state.modal = null;
    state.tab = 'dashboard';
    render();
  }

  document.addEventListener('click', async function(e){
    const tabBtn = e.target.closest('.tab');
    if(tabBtn){
      state.tab = tabBtn.dataset.tab;
      state.editingVisitId = null; state.editingPartyId = null; state.editingSpId = null;
      render();
      return;
    }

    if(e.target.id === 'exportCsvBtn'){ exportCsv(); return; }

    if(e.target.classList.contains('modal-backdrop')){ state.modal = null; render(); return; }

    const actionEl = e.target.closest('[data-action]');
    if(!actionEl) return;
    const action = actionEl.dataset.action;
    const id = actionEl.dataset.id;

    if(action === 'close-modal'){ state.modal = null; render(); }
    else if(action === 'view-party'){ state.modal = {type:'party', id:id}; render(); }
    else if(action === 'view-sp'){ state.modal = {type:'sp', id:id}; render(); }
    else if(action === 'edit-visit'){ state.editingVisitId = id; state.tab = 'addvisit'; render(); }
    else if(action === 'cancel-edit-visit'){ state.editingVisitId = null; render(); }
    else if(action === 'delete-visit'){
      if(confirm('Delete this visit record? This cannot be undone.')){
        await db.collection("visits").doc(id).delete();
      }
    }
    else if(action === 'edit-party'){ state.editingPartyId = id; render(); }
    else if(action === 'cancel-edit-party'){ state.editingPartyId = null; render(); }
    else if(action === 'delete-party'){
      const linked = state.visits.some(function(v){ return v.partyId === id; });
      const msg = linked
        ? 'This party has visit records linked to it. Deleting it will keep those records but show the party as “removed”. Continue?'
        : 'Delete this party?';
      if(confirm(msg)){
        state.editingPartyId = null;
        await db.collection("parties").doc(id).delete();
      }
    }
    else if(action === 'edit-sp'){ state.editingSpId = id; render(); }
    else if(action === 'cancel-edit-sp'){ state.editingSpId = null; render(); }
    else if(action === 'delete-sp'){
      const linked = state.visits.some(function(v){ return v.spId === id; });
      const msg = linked
        ? 'This salesperson has visit records linked to them. Deleting will keep those records but show them as “removed”. Continue?'
        : 'Delete this salesperson?';
      if(confirm(msg)){
        state.editingSpId = null;
        await db.collection("salespeople").doc(id).delete();
      }
    }
  });

  document.addEventListener('submit', async function(e){
    e.preventDefault();

    if(e.target.id === 'visitForm'){
      const spId = document.getElementById('vSp').value;
      const partyId = document.getElementById('vParty').value;
      const date = document.getElementById('vDate').value;
      const discussion = document.getElementById('vDiscussion').value.trim();
      const outcome = document.getElementById('vOutcome').value.trim();
      const existingId = document.getElementById('vId').value;
      if(!spId || !partyId || !date || !discussion) return;

      const targetId = existingId ? existingId : uid('v');
      await saveVisitCloud(targetId, { spId:spId, partyId:partyId, date:date, discussion:discussion, outcome:outcome });
      
      state.editingVisitId = null;
      state.tab = 'visitlog';
      render();
    }

    else if(e.target.id === 'partyForm'){
      const name = document.getElementById('pName').value.trim();
      const location = document.getElementById('pLocation').value.trim();
      const contact = document.getElementById('pContact').value.trim();
      const phone = document.getElementById('pPhone').value.trim();
      const assignedSpId = document.getElementById('pAssignedSp').value;
      const existingId = document.getElementById('pId').value;
      if(!name) return;

      const targetId = existingId ? existingId : uid('p');
      await savePartyCloud(targetId, { name:name, location:location, contact:contact, phone:phone, assignedSpId:assignedSpId });
      
      state.editingPartyId = null;
      e.target.reset();
      render();
    }

    else if(e.target.id === 'spForm'){
      const name = document.getElementById('sName').value.trim();
      const region = document.getElementById('sRegion').value.trim();
      const existingId = document.getElementById('sId').value;
      if(!name) return;

      const targetId = existingId ? existingId : uid('s');
      await saveSalespersonCloud(targetId, { name:name, region:region });
      
      state.editingSpId = null;
      e.target.reset();
      render();
    }
  });

  document.addEventListener('change', async function(e){
    if(e.target.id === 'dashMonthSelect'){ state.dashMonth = e.target.value; render(); }
    else if(e.target.id === 'dashSpSelect'){ state.dashSp = e.target.value; render(); }
    else if(e.target.id === 'logSpFilter'){ state.logFilters.sp = e.target.value; render(); }
    else if(e.target.id === 'logPartyFilter'){ state.logFilters.party = e.target.value; render(); }
    else if(e.target.id === 'logMonthFilter'){ state.logFilters.month = e.target.value; render(); }
    else if(e.target.dataset && e.target.dataset.action === 'assign-party'){
      const pid = e.target.dataset.id;
      await savePartyCloud(pid, { assignedSpId: e.target.value });
    }
  });

  document.addEventListener('input', function(e){
    if(e.target.id === 'logSearch'){ state.logFilters.search = e.target.value; render(); }
  });

  document.getElementById('resetDataBtn').addEventListener('click', resetAllData);

  function init(){
    state.dashMonth = currentMonthKey();
    setupCloudSync();
  }

  init();

})();
</script>
