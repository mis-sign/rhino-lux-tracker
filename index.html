<style>
  :root{
    --ink: #1F2937;
    --paper: #EAEFF4; 
    --panel: #FFFFFF;
    --hide: #6B7280;
    --hide-light: #E5E7EB;
    --hide-faint: #F9FAFB;
    --brand-orange: #F26F21; 
    --brand-grey: #4B5563; 
    --brand-gradient: linear-gradient(135deg, #F26F21 0%, #FF8A47 100%);
    --alert: #DC2626;
    --alert-bg: #FEF2F2;
    --good: #16A34A;
    --good-bg: #F0FDF4;
    --radius: 10px;
    --shadow: 0 4px 10px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; min-height: 100vh; }
  
  body{
    background-color: var(--paper);
    background-image: url('RLPL-3.png'); 
    background-repeat: no-repeat;
    background-position: center 65%;
    background-size: 550px auto; 
    background-attachment: fixed; 
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(234, 239, 244, 0.55); 
    z-index: -1;
    pointer-events: none;
  }
  
  h1,h2,h3{ font-family: var(--font-display); margin:0; color: var(--ink); }
  button, input, select, textarea{ font-family: inherit; font-size: inherit; color: inherit; }
  
  .shell{ position: relative; z-index: 1; max-width:1250px; margin:0 auto; padding:0 24px 64px; }

  .topbar{
    position: relative; z-index: 2;
    background: #FFFFFF;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    padding: 18px 24px;
    margin-bottom: 28px;
    border-top: 5px solid var(--brand-orange); 
    border-bottom: 1px solid var(--hide-light);
  }
  .topbar-inner{
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1202px; margin: 0 auto;
  }
  .brand{ display: flex; align-items: center; gap: 16px; }
  .brand__logo-img {
    height: 52px;
    width: auto;
    object-fit: contain;
  }
  .brand__title-block { display: flex; flex-direction: column; }
  .brand__name{ font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: 0.5px; color: #111827; }
  .brand__sub{ font-size: 13px; color: var(--brand-orange); font-weight: 600; letter-spacing: 0.3px; }

  .tabs{
    display: flex; gap: 8px; max-width: 1202px; margin: 0 auto 28px;
    background: #E5E7EB; padding: 5px; border-radius: 8px;
    overflow-x: auto;
  }
  .tab{
    background: none; border: none; cursor: pointer;
    padding: 11px 22px; font-size: 14px; font-weight: 600;
    color: #4B5563; border-radius: 6px; transition: all 0.2s ease;
    white-space: nowrap;
  }
  .tab:hover{ color: #111827; background: rgba(255,255,255,0.6); }
  .tab.active{ 
    background: var(--brand-orange); 
    color: #FFFFFF;
    box-shadow: 0 4px 12px rgba(242, 111, 33, 0.3);
  }

  .view-head{
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 16px; margin: 0 0 24px;
  }
  .eyebrow{
    font-family: var(--font-display); font-size: 12px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; color: var(--brand-grey);
    margin-bottom: 4px;
  }
  .view-head h2{ font-size: 26px; font-weight: 700; color: #111827; }
  .field-inline{ display: flex; align-items: center; gap: 10px; }
  .field-inline label{ font-size: 14px; font-weight: 600; color: #4B5563; }
  .dash-controls{ display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  
  .stat-grid{
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px;
  }
  .stat-card{
    background: rgba(255, 255, 255, 0.95); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 24px; border: 1px solid var(--hide-light);
    position: relative; overflow: hidden; backdrop-filter: blur(2px);
  }
  .stat-card__label{ font-size: 12px; font-weight: 700; color: var(--brand-grey); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card__value{ font-family: var(--font-display); font-size: 34px; font-weight: 700; color: #111827; }

  .panel{
    background: rgba(255, 255, 255, 0.95); border: 1px solid var(--hide-light); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 26px; margin-bottom: 24px; backdrop-filter: blur(2px);
  }
  .panel__head{ margin-bottom: 20px; border-bottom: 1px solid var(--hide-light); padding-bottom: 14px; }
  .panel__head h3{ font-size: 18px; font-weight: 700; color: #111827; }
  .panel__subhead{ font-size: 16px; font-weight: 700; margin: 0 0 16px; color: #111827; }
  .panel--form{ background: rgba(255, 255, 255, 0.98); border-top: 4px solid var(--brand-grey); }

  .notice{
    background: #FFF7ED; border: 1px solid #FFEDD5; border-radius: var(--radius);
    padding: 16px; font-size: 14px; color: #C2410C; line-height: 1.6;
    border-left: 4px solid var(--brand-orange);
  }

  .alert-toast{
    background: var(--good-bg); border: 1px solid var(--good); border-radius: 6px;
    padding: 12px; font-size: 14px; color: var(--good); margin-bottom: 16px;
    font-weight: 600; display: none;
  }

  .form-row{ display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row:has(.form-field:nth-child(2):last-child){ grid-template-columns: 1fr 1fr; }
  .form-field{ display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-row .form-field{ margin-bottom:0; }
  .form-field label{ font-size: 14px; font-weight: 600; color: #374151; }
  .form-field .optional{ font-weight: 400; color: var(--hide); }
  .form-field input, .form-field select, .form-field textarea, .filter-bar input, .filter-bar select{
    border: 1px solid #D1D5DB; border-radius: 6px;
    padding: 11px 14px; background: #FFF; width: 100%; transition: all 0.15s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus, .filter-bar input:focus, .filter-bar select:focus{
    border-color: var(--brand-orange); outline: none; box-shadow: 0 0 0 3px rgba(242, 111, 33, 0.15);
  }
  .form-actions{ display: flex; gap: 12px; margin-top: 8px; }

  .btn{
    border: none; background: var(--brand-gradient); color: #FFF;
    border-radius: 6px; padding: 12px 24px; font-weight: 600; font-size: 14px;
    cursor: pointer; transition: background 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 6px rgba(242, 111, 33, 0.2);
  }
  .btn:hover{ box-shadow: 0 4px 12px rgba(242, 111, 33, 0.35); filter: brightness(1.05); }
  .btn:active { transform: translateY(1px); }
  .btn--ghost{ background: #FFFFFF; color: #374151; border: 1px solid #D1D5DB; box-shadow: none; }
  .btn--ghost:hover{ background: #F9FAFB; border-color: #9CA3AF; box-shadow: none; }

  .table-wrap{ overflow-x: auto; }
  .table{ width: 100%; border-collapse: collapse; font-size: 14px; }
  .table th{
    text-align: left; font-family: var(--font-body); font-size: 12px;
    letter-spacing: 0.5px; text-transform: uppercase; color: var(--brand-grey); font-weight: 700;
    background: #F3F4F6; border-bottom: 2px solid var(--hide-light); padding: 14px;
  }
  .table td{ padding: 14px; border-bottom: 1px solid var(--hide-light); vertical-align: middle; }
  .table tr:hover td { background-color: #F9FAFB; }
  .table tr.row--alert td{ background: rgba(254, 242, 242, 0.7); }
  
  .badge{ display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .badge--alert{ background: var(--alert-bg); color: var(--alert); border: 1px solid rgba(220,38,38,0.15); }
  .badge--good{ background: var(--good-bg); color: var(--good); border: 1px solid rgba(22,163,74,0.15); }
  
  .link-btn{
    background: none; border: none; cursor: pointer; color: var(--brand-orange);
    font-weight: 600; font-size: 13px; padding: 4px 8px; border-radius: 4px;
  }
  .link-btn:hover{ background: rgba(242, 111, 33, 0.08); text-decoration: underline; }
  .link-btn--danger{ color: var(--alert); }
  .link-btn--danger:hover{ background: rgba(220,38,38,0.08); }

  .filter-bar{ display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; background: rgba(255, 255, 255, 0.95); padding: 16px; border-radius: var(--radius); border: 1px solid var(--hide-light); }
  .filter-bar input{ flex: 2; min-width: 250px; }
  .filter-bar select{ flex: 1; min-width: 180px; }

  .pulse{ display: flex; gap: 5px; }
  .pulse__cell{ width: 14px; height: 14px; border-radius: 3px; background: #E5E7EB; }
  .pulse__cell--filled{ background: var(--brand-orange); }

  .activity-list{ display: flex; flex-direction: column; gap: 14px; }
  .activity-item{ display: flex; gap: 20px; padding: 16px; background: rgba(249, 250, 251, 0.9); border-radius: 6px; border-left: 4px solid var(--brand-orange); border-top: 1px solid var(--hide-light); border-right: 1px solid var(--hide-light); border-bottom: 1px solid var(--hide-light); }
  .activity-item__date{ width: 100px; flex-shrink: 0; font-size: 13px; color: var(--hide); font-weight: 700; text-transform: uppercase; }
  .activity-item__body{ flex: 1; }
  .activity-item__title{ font-size: 15px; margin-bottom: 4px; color: #111827; }
  .activity-item__note{ font-size: 14px; color: #4B5563; font-style: italic; }

  .empty-state{ color: var(--hide); font-size: 14px; padding: 32px 0; text-align: center; font-style: italic; }
  .loading-state{ color: var(--brand-orange); font-size: 16px; font-weight: 600; padding: 80px 0; text-align: center; font-family: var(--font-display); }

  .modal-backdrop{ position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; backdrop-filter: blur(3px); }
  .modal{ background: var(--panel); border-radius: var(--radius); max-width: 600px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.15); border-top: 6px solid var(--brand-orange); }
  .modal__head{ display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--hide-light); }
  .modal__head h3{ font-size: 18px; font-weight: 700; }
  .modal__close{ background: none; border: none; font-size: 26px; cursor: pointer; color: var(--hide); }
  .modal__close:hover{ color: var(--ink); }
  .modal__body{ padding: 24px; overflow-y: auto; }

  .footer{ position: relative; z-index: 2; max-width: 1202px; margin: 40px auto 0; padding: 24px 0; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--brand-grey); font-weight: 500; border-top: 1px solid var(--hide-light); }
  .footer button{ background: none; border: none; color: #EF4444; text-decoration: underline; cursor: pointer; font-weight: 600; }
  .footer button:hover{ color: #B91C1C; }

  @media (max-width: 760px){
    .stat-grid{ grid-template-columns: 1fr 1fr; }
    .form-row{ grid-template-columns: 1fr !important; }
    .topbar-inner{ flex-direction: column; gap: 12px; align-items: flex-start; }
    .tabs{ padding: 4px; }
    body{ background-size: 320px auto; background-position: center 50%; }
  }
</style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img class="brand__logo-img" src="RLPL-3.png" alt="Rhino Lux Logo">
        <div class="brand__title-block">
          <div class="brand__name">RHINO LUX</div>
          <div class="brand__sub">Sales Field Intelligence & Customer Coverage Platform</div>
        </div>
      </div>
    </div>
  </header>

  <div class="shell">
    <nav class="tabs">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="addvisit">Log a Visit</button>
      <button class="tab" data-tab="visitlog">Visit Log</button>
      <button class="tab" data-tab="parties">Parties</button>
      <button class="tab" data-tab="team">Sales Team</button>
    </nav>
    
    <div id="app"><div class="loading-state">Connecting to cloud analytics network...</div></div>
  </div>

  <div class="shell" style="padding-top: 0; padding-bottom: 24px;">
    <div class="footer">
      <span>Corporate Shared Workspace • Realtime Sync Activated</span>
      <button id="resetDataBtn">Reset System Database</button>
    </div>
  </div>

<script>
(function(){
  let state = {
    tab: 'dashboard',
    salespeople: [],
    parties: [],
    visits: [],
    dashMonth: null,
    dashSp: 'all',
    editingVisitId: null,
    editingPartyId: null,
    editingSpId: null,
    selectedFormSpId: '',
    modal: null,
    logFilters: { sp:'all', party:'all', month:'all', search:'' },
    showSuccessToast: false
  };

  function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function esc(str){
    if(str === undefined || str === null) return '';
    return String(str).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function currentMonthKey(){ return new Date().toISOString().slice(0,7); }

  function monthLabel(mk){
    if(!mk) return '';
    const parts = mk.split('-');
    const y = Number(parts[0]), m = Number(parts[1]);
    const names=['January','February','March','April','May','June','July','August','September','October','November','December'];
    return names[m-1] + ' ' + y;
  }

  function shiftMonth(mk, delta){
    const parts = mk.split('-');
    let y = Number(parts[0]), m = Number(parts[1]);
    m += delta;
    while(m<1){ m+=12; y-=1; }
    while(m>12){ m-=12; y+=1; }
    return y + '-' + String(m).padStart(2,'0');
  }

  function dateLabel(dateStr){
    if(!dateStr) return '—';
    const d = new Date(dateStr + 'T00:00:00');
    if(isNaN(d.getTime())) return dateStr;
    const names=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return names[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function daysSince(dateStr){
    if(!dateStr) return null;
    const d = new Date(dateStr + 'T00:00:00');
    const now = new Date(); now.setHours(0,0,0,0);
    return Math.round((now - d) / 86400000);
  }

  function spName(id){ const s = state.salespeople.find(function(x){ return x.id===id; }); return s ? s.name : '— removed —'; }
  function partyName(id){ const p = state.parties.find(function(x){ return x.id===id; }); return p ? p.name : '— removed —'; }

  function visitsForParty(id){
    return state.visits.filter(function(v){ return v.partyId===id; })
      .sort(function(a,b){ return b.date.localeCompare(a.date); });
  }
  function visitsForSp(id){
    return state.visits.filter(function(v){ return v.spId===id; })
      .sort(function(a,b){ return b.date.localeCompare(a.date); });
  }
  function visitsInMonthForParty(id, mk){
    return state.visits.filter(function(v){ return v.partyId===id && v.date.slice(0,7)===mk; });
  }
  function totalVisitsInMonth(mk){
    return state.visits.filter(function(v){ return v.date.slice(0,7)===mk; }).length;
  }
  function partiesAssignedTo(spId){
    return state.parties.filter(function(p){ return p.assignedSpId === spId; });
  }
  function unassignedParties(){
    return state.parties.filter(function(p){
      return !p.assignedSpId || !state.salespeople.some(function(s){ return s.id === p.assignedSpId; });
    });
  }
  function visitedInMonthBySp(spId, partyId, mk){
    return state.visits.some(function(v){ return v.spId===spId && v.partyId===partyId && v.date.slice(0,7)===mk; });
  }
  function lastVisitByForParty(spId, partyId){
    const vs = state.visits.filter(function(v){ return v.spId===spId && v.partyId===partyId; })
      .sort(function(a,b){ return b.date.localeCompare(a.date); });
    return vs.length ? vs[0].date : null;
  }

  function pulseMonths(refMk, count){
    const arr = []; let mk = refMk;
    for(let i=0;i<count;i++){ arr.unshift(mk); mk = shiftMonth(mk,-1); }
    return arr;
  }
  function renderPulse(partyId, refMk){
    const months = pulseMonths(refMk, 6);
    return '<div class="pulse">' + months.map(function(mk){
      const visited = visitsInMonthForParty(partyId, mk).length > 0;
      return '<span class="pulse__cell' + (visited?' pulse__cell--filled':'') + '" title="' + esc(monthLabel(mk)) + ': ' + (visited?'visited':'no visit') + '"></span>';
    }).join('') + '</div>';
  }
  function renderPulseForSp(partyId, spId, refMk){
    const months = pulseMonths(refMk, 6);
    return '<div class="pulse">' + months.map(function(mk){
      const visited = visitedInMonthBySp(spId, partyId, mk);
      return '<span class="pulse__cell' + (visited?' pulse__cell--filled':'') + '" title="' + esc(monthLabel(mk)) + ': ' + (visited?'visited':'no visit') + '"></span>';
    }).join('') + '</div>';
  }

  function buildMonthOptionsForDashboard(selectedMk){
    const set = new Set(state.visits.map(function(v){ return v.date.slice(0,7); }));
    set.add(currentMonthKey());
    set.add(selectedMk);
    const arr = Array.from(set).sort().reverse();
    return arr.map(function(mk){
      return '<option value="' + mk + '"' + (mk===selectedMk?' selected':'') + '>' + esc(monthLabel(mk)) + '</option>';
    }).join('');
  }

  function setupCloudSync(){
    db.collection("salespeople").onSnapshot(function(snapshot) {
      state.salespeople = [];
      snapshot.forEach(function(doc) { state.salespeople.push({id: doc.id, ...doc.data()}); });
      render();
    });

    db.collection("parties").onSnapshot(function(snapshot) {
      state.parties = [];
      snapshot.forEach(function(doc) { state.parties.push({id: doc.id, ...doc.data()}); });
      render();
    });

    db.collection("visits").onSnapshot(function(snapshot) {
      state.visits = [];
      snapshot.forEach(function(doc) { state.visits.push({id: doc.id, ...doc.data()}); });
      render();
    });
  }

  async function saveSalespersonCloud(id, data){ await db.collection("salespeople").doc(id).set(data, {merge: true}); }
  async function savePartyCloud(id, data){ await db.collection("parties").doc(id).set(data, {merge: true}); }
  async function saveVisitCloud(id, data){ await db.collection("visits").doc(id).set(data, {merge: true}); }

  function renderDashboard(){
    const mk = state.dashMonth || currentMonthKey();
    const spScope = state.dashSp || 'all';

    const spOptions = ['<option value="all"' + (spScope==='all'?' selected':'') + '>All Sales Persons</option>'].concat(
      state.salespeople.slice().sort(function(a,b){ return a.name.localeCompare(b.name); }).map(function(s){
        return '<option value="' + s.id + '"' + (spScope===s.id?' selected':'') + '>' + esc(s.name) + '</option>';
      })
    ).join('');

    const head = ''
    + '<div class="view-head">'
    +   '<div><div class="eyebrow">Overview</div><h2>Dashboard Analytics</h2></div>'
    +   '<div class="dash-controls">'
    +     '<div class="field-inline"><label for="dashSpSelect">Sales Person</label>'
    +       '<select id="dashSpSelect" style="width: auto;">' + spOptions + '</select></div>'
    +     '<div class="field-inline"><label for="dashMonthSelect">Month</label>'
    +       '<select id="dashMonthSelect" style="width: auto;">' + buildMonthOptionsForDashboard(mk) + '</select></div>'
    +   '</div>'
    + '</div>';

    if(spScope === 'all') return head + renderDashboardAll(mk);
    const spExists = state.salespeople.some(function(s){ return s.id === spScope; });
    if(!spExists) return head + '<div class="panel"><div class="empty-state">No profile data found.</div></div>';
    return head + renderDashboardForSalesperson(spScope, mk);
  }

  function renderDashboardAll(mk){
    const totalVisits = state.visits.length;
    const visitsThisMonth = totalVisitsInMonth(mk);
    const teamSize = state.salespeople.length;

    const sortedSp = state.salespeople.slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
    const coverageRows = sortedSp.map(function(s){
      const assigned = partiesAssignedTo(s.id);
      const visitedCount = assigned.filter(function(p){ return visitedInMonthBySp(s.id, p.id, mk); }).length;
      const notVisitedCount = assigned.length - visitedCount;
      const pct = assigned.length ? Math.round((visitedCount / assigned.length) * 100) : null;
      return { sp:s, assignedCount: assigned.length, visitedCount:visitedCount, notVisitedCount:notVisitedCount, pct:pct };
    });
    const totalNotVisitedAssigned = coverageRows.reduce(function(sum,r){ return sum + r.notVisitedCount; }, 0);
    const unassigned = unassignedParties();

    const notVisitedAll = state.parties
      .map(function(p){
        const vs = visitsForParty(p.id);
        const last = vs.length ? vs[0].date : null;
        const inMonth = visitsInMonthForParty(p.id, mk).length;
        const assignedSp = state.salespeople.find(function(s){ return s.id === p.assignedSpId; });
        return { id:p.id, name:p.name, location:p.location, last:last, inMonth:inMonth, assignedName: assignedSp ? assignedSp.name : null };
      })
      .filter(function(p){ return p.inMonth === 0; })

  function renderDashboardForSalesperson(spId, mk){

    const spLabel = sp ? sp.name : '— removed —';
    const myVisits = visitsForSp(spId);
    const assigned = partiesAssignedTo(spId).slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
    
    const coverage = assigned.map(function(p){
      return { id:p.id, name:p.name, location:p.location, lastVisit:lastVisitByForParty(spId, p.id), visitedThisMonth:visitedInMonthBySp(spId, p.id, mk) };

    const notVisited = coverage.filter(function(c){ return !c.visitedThisMonth; });
    const visited = coverage.filter(function(c){ return c.visitedThisMonth; });

    return ''
    + '<div class="stat-grid">'
    +   '<div class="stat-card" style="position: relative; overflow: hidden; backdrop-filter: blur(2px); border: 1px solid var(--hide-light);"><div style="position: absolute; top:0; left:0; width: 4px; height: 100%; background: var(--brand-orange);"></div><div class="stat-card__label">Total Portfolio</div><div class="stat-card__value">' + assigned.length + '</div></div>'
    +   '<div class="stat-card" style="position: relative; overflow: hidden; backdrop-filter: blur(2px); border: 1px solid var(--hide-light);"><div style="position: absolute; top:0; left:0; width: 4px; height: 100%; background: var(--brand-orange);"></div><div class="stat-card__label">Visited This Month</div><div class="stat-card__value">' + visited.length + '</div></div>'
    +   '<div class="stat-card" style="position: relative; overflow: hidden; backdrop-filter: blur(2px); border: 1px solid rgba(220, 38, 38, 0.15); background: rgba(254, 242, 242, 0.95);"><div style="position: absolute; top:0; left:0; width: 4px; height: 100%; background: var(--alert);"></div><div class="stat-card__label" style="color: var(--alert);">Pending Visits</div><div class="stat-card__value" style="color: var(--alert);">' + notVisited.length + '</div></div>'
    +   '<div class="stat-card" style="position: relative; overflow: hidden; backdrop-filter: blur(2px); border: 1px solid var(--hide-light);"><div style="position: absolute; top:0; left:0; width: 4px; height: 100%; background: var(--brand-orange);"></div><div class="stat-card__label">Total Logs</div><div class="stat-card__value">' + myVisits.length + '</div></div>'

    +   '<div class="panel__head"><div class="eyebrow">Account Matrix</div><h3>' + esc(spLabel) + ' — Client Status</h3></div>'

          : '<div class="table-wrap"><table class="table"><thead><tr><th>Client Name</th><th>Location</th><th>Status</th><th>Last Visit Date</th><th>6-Month History</th></tr></thead><tbody>'
            + notVisited.map(function(c){
                return '<tr class="row--alert"><td><strong>' + esc(c.name) + '</strong></td><td>' + esc(c.location||'—') + '</td>'
                  + '<td><span class="badge badge--alert">No Visit</span></td>'

                  + '<td>' + renderPulseForSp(c.id, spId, mk) + '</td></tr>';
              }).join('')
            + visited.map(function(c){
                return '<tr><td><strong>' + esc(c.name) + '</strong></td><td>' + esc(c.location||'—') + '</td>'
                  + '<td><span class="badge badge--good">Visited</span></td>'

              }).join('')
            + '</tbody></table></div>')
    + '</div>';

  function renderVisitLog(){
    const f = state.logFilters;
    let rows = state.visits.slice();
    if(f.sp !== 'all') rows = rows.filter(function(v){ return v.spId===f.sp; });
    if(f.party !== 'all') rows = rows.filter(function(v){ return v.partyId===f.party; });
    if(f.month !== 'all') rows = rows.filter(function(v){ return v.date.slice(0,7)===f.month; });
    if(f.search){
      const q = f.search.toLowerCase();
      rows = rows.filter(function(v){
        return (v.discussion||'').toLowerCase().indexOf(q)>-1 || (v.outcome||'').toLowerCase().indexOf(q)>-1 || spName(v.spId).toLowerCase().indexOf(q)>-1 || partyName(v.partyId).toLowerCase().indexOf(q)>-1;
      });
    }
    rows.sort(function(a,b){ return b.date.localeCompare(a.date); });

    return ''
    + '<div class="view-head"><div><div class="eyebrow">Logs Ledger</div><h2>Centralized Visit History</h2></div>'
    +   '<button class="btn btn--ghost" id="exportCsvBtn" type="button">Export to CSV/Excel</button></div>'
    + '<div class="filter-bar">'
    +   '<input type="text" id="logSearch" placeholder="Search comments, discussion text or keywords..." value="' + esc(f.search) + '">'
    +   '<select id="logSpFilter">' + ['<option value="all">All Sales Persons</option>'].concat(state.salespeople.map(function(s){ return '<option value="' + s.id + '"' + (f.sp===s.id?' selected':'') + '>' + esc(s.name) + '</option>'; })).join('') + '</select>'
    +   '<select id="logPartyFilter">' + ['<option value="all">All Clients</option>'].concat(state.parties.map(function(p){ return '<option value="' + p.id + '"' + (f.party===p.id?' selected':'') + '>' + esc(p.name) + '</option>'; })).join('') + '</select>'
    +   '<select id="logMonthFilter">' + ['<option value="all">All History</option>'].concat(Array.from(new Set(state.visits.map(function(v){ return v.date.slice(0,7); }))).sort().reverse().map(function(mk){ return '<option value="' + mk + '"' + (f.month===mk?' selected':'') + '>' + esc(monthLabel(mk)) + '</option>'; })).join('') + '</select>'
    + '</div>'
    + '<div class="panel">'
    +   (rows.length===0
          ? '<div class="empty-state">No matching logs found.</div>'
          : '<div class="table-wrap"><table class="table"><thead><tr><th>Date</th><th>Sales Person</th><th>Client Name</th><th>Discussion / Summary</th><th>Next Steps</th><th>Actions</th></tr></thead><tbody>'
            + rows.map(function(v){
                return '<tr><td class="nowrap">' + esc(dateLabel(v.date)) + '</td><td class="nowrap"><strong>' + esc(spName(v.spId)) + '</strong></td>'
                  + '<td class="nowrap"><strong>' + esc(partyName(v.partyId)) + '</strong></td><td>' + esc(v.discussion) + '</td><td>' + esc(v.outcome||'—') + '</td>'
                  + '<td class="nowrap actions-cell"><button class="link-btn" data-action="edit-visit" data-id="' + v.id + '">Edit</button>'
                  + '<button class="link-btn link-btn--danger" data-action="delete-visit" data-id="' + v.id + '">Delete</button></td></tr>';
              }).join('')
            + '</tbody></table></div>')
    + '</div>';
  }

  function renderModal(){

    else { const s = state.salespeople.find(function(x){ return x.id===m.id; }); title = s ? s.name : 'Salesperson'; vs = visitsForSp(m.id); }

    return ''
    + '<div class="modal-backdrop">'
    +   '<div class="modal">'
    +     '<div class="modal__head"><h3>Visit Logs: ' + esc(title) + '</h3>'
    +       '<button class="modal__close" data-action="close-modal">&times;</button></div>'
    +     '<div class="modal__body">'
    +       (vs.length===0
            ? '<div class="empty-state">No visit history logs recorded.</div>'
            : vs.map(function(v){
                return '<div class="activity-item" style="margin-bottom:12px;"><div class="activity-item__date">' + esc(dateLabel(v.date)) + '</div>'
                  + '<div class="activity-item__body"><div class="activity-item__title"><strong>'
                  + (m.type==='party' ? esc(spName(v.spId)) : esc(partyName(v.partyId)))
                  + '</strong></div><div class="activity-item__note">“' + esc(v.discussion) + '”</div>'
                  + (v.outcome ? '<div style="color:var(--brand-orange); font-size:13px; font-weight:600; margin-top:4px;">Next Step: ' + esc(v.outcome) + '</div>' : '')
                  + '</div></div>';
              }).join(''))
    +     '</div>'
    +   '</div>'
    + '</div>';
  }

  function render(){
    const active = document.activeElement; const activeId = active && active.id;
    const selStart = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;
    const selEnd = active && typeof active.selectionEnd === 'number' ? active.selectionEnd : null;

    const app = document.getElementById('app'); let html = '';
    if(state.tab === 'dashboard') html = renderDashboard();
    else if(state.tab === 'addvisit') html = renderAddVisit();
    else if(state.tab === 'visitlog') html = renderVisitLog();
    else if(state.tab === 'parties') html = renderParties();
    else if(state.tab === 'team') html = renderTeam();

    if(app) app.innerHTML = html + renderModal();
    document.querySelectorAll('.tab').forEach(function(btn){ btn.classList.toggle('active', btn.dataset.tab === state.tab); });

    if(activeId){
      const el = document.getElementById(activeId);
      if(el){ el.focus(); if(selStart !== null && el.setSelectionRange){ try{ el.setSelectionRange(selStart, selEnd); }catch(e){} } }
    }
  }

  function exportCsv(){
    const f = state.logFilters; let rows = state.visits.slice();
    if(f.sp !== 'all') rows = rows.filter(function(v){ return v.spId===f.sp; });
    if(f.party !== 'all') rows = rows.filter(function(v){ return v.partyId===f.party; });
    if(f.month !== 'all') rows = rows.filter(function(v){ return v.date.slice(0,7)===f.month; });
    if(f.search){
      const q = f.search.toLowerCase();
      rows = rows.filter(function(v){
        return (v.discussion||'').toLowerCase().indexOf(q)>-1 || (v.outcome||'').toLowerCase().indexOf(q)>-1 || spName(v.spId).toLowerCase().indexOf(q)>-1 || partyName(v.partyId).toLowerCase().indexOf(q)>-1;
      });
    }
    rows.sort(function(a,b){ return b.date.localeCompare(a.date); });

    const header = ['Date','Sales Person','Client Name','Discussion Notes','Next Steps'];
    const csvRows = [header.join(',')];
    rows.forEach(function(v){
      const cells = [v.date, spName(v.spId), partyName(v.partyId), v.discussion||'', v.outcome||''];
      csvRows.push(cells.map(function(c){ return '"' + String(c).replace(/"/g,'""') + '"'; }).join(','));
    });
    const csv = csvRows.join('\n'); const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob); const a = document.createElement('a');
    a.href = url; a.download = 'rhino-lux-visit-reports.csv'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  async function resetAllData(){
    if(!confirm('This will delete all logs across devices. Reset everything?')) return;
    if(!confirm('Are you absolutely sure? This action cannot be reversed.')) return;
    const tables = ['salespeople', 'parties', 'visits'];
    for(let table of tables){ const snap = await db.collection(table).get(); snap.forEach(function(doc) { doc.ref.delete(); }); }
    state.salespeople = []; state.parties = []; state.visits = [];
    state.editingVisitId = null; state.editingPartyId = null; state.editingSpId = null; state.modal = null; state.selectedFormSpId = '';
    state.tab = 'dashboard'; render();
  }

  document.addEventListener('click', async function(e){
    const tabBtn = e.target.closest('.tab'); 
    if(tabBtn){ 
      state.tab = tabBtn.dataset.tab; 
      state.editingVisitId = null; 
      state.editingPartyId = null; 
      state.editingSpId = null; 
      state.selectedFormSpId = '';
      state.showSuccessToast = false;
      render(); 
      return; 
    }
    if(e.target.id === 'exportCsvBtn'){ exportCsv(); return; }
    if(e.target.classList.contains('modal-backdrop')){ state.modal = null; render(); return; }
    const actionEl = e.target.closest('[data-action]'); if(!actionEl) return;
    const action = actionEl.dataset.action; const id = actionEl.dataset.id;

    if(action === 'close-modal'){ state.modal = null; render(); }
    else if(action === 'view-party'){ state.modal = {type:'party', id:id}; render(); }
    else if(action === 'view-sp'){ state.modal = {type:'sp', id:id}; render(); }
    else if(action === 'edit-visit'){ state.editingVisitId = id; state.tab = 'addvisit'; render(); }
    else if(action === 'cancel-edit-visit'){ state.editingVisitId = null; state.selectedFormSpId = ''; render(); }
    else if(action === 'delete-visit'){ if(confirm('Delete this visit log entry?')){ await db.collection("visits").doc(id).delete(); } }
    else if(action === 'edit-party'){ state.editingPartyId = id; render(); }
    else if(action === 'cancel-edit-party'){ state.editingPartyId = null; render(); }
    else if(action === 'delete-party'){ if(confirm('Delete this client account?')){ state.editingPartyId = null; await db.collection("parties").doc(id).delete(); } }
    else if(action === 'edit-sp'){ state.editingSpId = id; render(); }
    else if(action === 'cancel-edit-sp'){ state.editingSpId = null; render(); }
    else if(action === 'delete-sp'){ if(confirm('Remove this sales person from registry?')){ state.editingSpId = null; await db.collection("salespeople").doc(id).delete(); } }
  });

  document.addEventListener('submit', async function(e){
    e.preventDefault();
    if(e.target.id === 'visitForm'){
      const spId = document.getElementById('vSp').value; const partyId = document.getElementById('vParty').value;
      const date = document.getElementById('vDate').value; const discussion = document.getElementById('vDiscussion').value.trim();
      const outcome = document.getElementById('vOutcome').value.trim(); const existingId = document.getElementById('vId').value;
      if(!spId || !partyId || !date || !discussion) return;
      
      const targetId = existingId ? existingId : uid('v');
      await saveVisitCloud(targetId, { spId:spId, partyId:partyId, date:date, discussion:discussion, outcome:outcome });
      
      if (existingId) {
        state.editingVisitId = null;
        state.selectedFormSpId = '';
        state.tab = 'visitlog';
        render();
      } else {
        state.selectedFormSpId = ''; 
        state.showSuccessToast = true; 
        render();
        
        const inputFocus = document.getElementById('vSp');
        if(inputFocus) inputFocus.focus();
        
        setTimeout(function(){
          state.showSuccessToast = false;
          const toast = document.getElementById('successToast');
          if(toast) toast.style.display = 'none';
        }, 3000);
      }
    }
    else if(e.target.id === 'partyForm'){
      const name = document.getElementById('pName').value.trim(); const location = document.getElementById('pLocation').value.trim();
      const contact = document.getElementById('pContact').value.trim(); const phone = document.getElementById('pPhone').value.trim();
      const assignedSpId = document.getElementById('pAssignedSp').value; const existingId = document.getElementById('pId').value;
      if(!name) return;
      const targetId = existingId ? existingId : uid('p');
      await savePartyCloud(targetId, { name:name, location:location, contact:contact, phone:phone, assignedSpId:assignedSpId });
      state.editingPartyId = null; e.target.reset(); render();
    }
    else if(e.target.id === 'spForm'){
      const name = document.getElementById('sName').value.trim(); const region = document.getElementById('sRegion').value.trim();
      const existingId = document.getElementById('sId').value; if(!name) return;
      const targetId = existingId ? existingId : uid('s');
      await saveSalespersonCloud(targetId, { name:name, region:region });
      state.editingSpId = null; e.target.reset(); render();
    }
  });

  document.addEventListener('change', async function(e){
    if(e.target.id === 'dashMonthSelect'){ state.dashMonth = e.target.value; render(); }
    else if(e.target.id === 'dashSpSelect'){ state.dashSp = e.target.value; render(); }
    else if(e.target.id === 'logSpFilter'){ state.logFilters.sp = e.target.value; render(); }
    else if(e.target.id === 'logPartyFilter'){ state.logFilters.party = e.target.value; render(); }
    else if(e.target.id === 'logMonthFilter'){ state.logFilters.month = e.target.value; render(); }
    else if(e.target.id === 'vSp'){ 
      state.selectedFormSpId = e.target.value; 
      render(); 
    }
    else if(e.target.dataset && e.target.dataset.action === 'assign-party'){ const pid = e.target.dataset.id; await savePartyCloud(pid, { assignedSpId: e.target.value }); }
  });

  document.addEventListener('input', function(e){ if(e.target.id === 'logSearch'){ state.logFilters.search = e.target.value; render(); } });
  document.getElementById('resetDataBtn').addEventListener('click', resetAllData);

  function init(){ state.dashMonth = currentMonthKey(); setupCloudSync(); }
  init();
})();
</script>
</body>
</html>
